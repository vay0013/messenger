services:
  app:
    container_name: messenger
    image: messenger
    build: ./
    ports:
      - '8080:8080'
    restart: unless-stopped
    depends_on:
      - db
  db:
    image: postgres
    restart: always
    ports:
      - '8084:5432'
    environment:
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: messenger